<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معرض صور المتابعين - بدر المطيري</title>
<link rel="icon" href="images/img3.png" onerror="this.href='data:,'">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#171310;
    --bg-elev:#211c17;
    --bg-elev-2:#2a231c;
    --gold:#c9a15f;
    --gold-soft:#e4c98a;
    --cream:#f1e9d8;
    --muted:#9c8f79;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--cream);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 20px 40px;
  }
  .display{font-family:'Amiri', serif;}

  .avatar{
    width:96px; height:96px; border-radius:50%;
    background:var(--bg-elev) center/cover no-repeat;
    border:2px solid var(--gold);
    box-shadow:0 0 0 8px rgba(201,161,95,.08);
    margin-bottom:18px;
  }
  .avatar.noimg{ background:var(--bg-elev); }

  h1{
    font-family:'Amiri', serif;
    font-size:clamp(1.5rem, 6vw, 2rem);
    color:var(--gold-soft);
    text-align:center;
  }
  .subtitle{
    color:var(--muted);
    font-size:.9rem;
    margin-top:8px;
    margin-bottom:30px;
    text-align:center;
    max-width:460px;
    line-height:1.7;
  }
  .subtitle a{ color:var(--gold-soft); }

  .grid{
    width:100%;
    max-width:960px;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
    gap:12px;
  }
  .grid figure{
    margin:0;
    position:relative;
    border-radius:14px;
    overflow:hidden;
    border:1px solid rgba(201,161,95,.22);
    background:var(--bg-elev);
    cursor:pointer;
    aspect-ratio:1/1;
  }
  .grid img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    transition:transform .4s ease;
  }
  .grid figure:hover img{ transform:scale(1.06); }
  .grid figcaption{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:8px 10px 7px;
    background:linear-gradient(to top, rgba(10,8,6,.85), transparent);
    font-size:.75rem;
    color:var(--gold-soft);
    text-align:center;
    opacity:0;
    transition:opacity .3s ease;
  }
  .grid figure:hover figcaption{ opacity:1; }

  .empty-state{
    text-align:center;
    color:var(--muted);
    font-size:.92rem;
    padding:50px 20px;
    max-width:400px;
    line-height:1.8;
  }
  .empty-state a{
    display:inline-block;
    margin-top:16px;
    padding:12px 26px;
    border-radius:999px;
    background:var(--gold);
    color:#211c17;
    text-decoration:none;
    font-weight:900;
    font-size:.9rem;
  }

  .lightbox{
    position:fixed; inset:0;
    background:rgba(10,8,6,.92);
    display:none;
    align-items:center;
    justify-content:center;
    padding:30px;
    z-index:50;
  }
  .lightbox.show{ display:flex; }
  .lightbox img{
    max-width:100%; max-height:85vh;
    border-radius:12px;
    border:1px solid rgba(201,161,95,.35);
  }
  .lightbox-close{
    position:absolute;
    top:20px; left:20px;
    width:40px; height:40px;
    border-radius:50%;
    background:var(--bg-elev);
    border:1px solid var(--gold);
    color:var(--gold-soft);
    font-size:1.3rem;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }

  .links-nav{
    width:100%;
    max-width:420px;
    margin-top:38px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .back-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px 20px;
    border-radius:999px;
    text-decoration:none;
    font-weight:700;
    font-size:.92rem;
    color:var(--gold-soft);
    background:transparent;
    border:1px solid var(--gold);
    transition:transform .3s ease, background .3s ease;
  }
  .back-btn:hover{
    transform:translateY(-3px);
    background:rgba(201,161,95,.08);
  }
  .back-btn svg{ width:16px; height:16px; }
</style>
</head>
<body>

<div class="avatar" id="avatar"></div>
<h1 class="display">معرض صور المتابعين</h1>
<p class="subtitle">
  صور رفعها متابعين بدر بعد المراجعة.
  تبي تشارك صورتك؟ <a href="upload.html">ارفعها من هنا</a>.
</p>

<div class="grid" id="grid"></div>
<div class="empty-state" id="emptyState" style="display:none">
  لسا ما فيه صور منشورة.<br>كن أول واحد يشارك صورته!
  <br>
  <a href="upload.html">ارفع صورتك</a>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-close" id="lightboxClose">✕</div>
  <img id="lightboxImg" alt="">
</div>

<div class="links-nav">
  <a class="back-btn" href="links.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    الرجوع للروابط
  </a>
</div>

<script>
  /*
    إضافة صورة جديدة للمعرض:
    1. حط ملف الصورة داخل مجلد images/fan/
    2. ضيف اسم الملف بالقائمة تحت (photos)
    3. ارفع (commit + push) للمشروع
  */
  const photos = [
    // { file: 'fan/example1.jpg', caption: '@username' },
  ];

  function checkImg(url){
    return new Promise(res=>{
      const img = new Image();
      img.onload = ()=>res(true);
      img.onerror = ()=>res(false);
      img.src = url;
    });
  }
  checkImg('images/img3.png').then(ok=>{
    const av = document.getElementById('avatar');
    if(ok){ av.style.backgroundImage = "url('images/img3.png')"; }
    else{ av.classList.add('noimg'); }
  });

  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  const lightboxClose = document.getElementById('lightboxClose');

  if(photos.length === 0){
    emptyState.style.display = 'block';
  } else {
    photos.forEach(p=>{
      const fig = document.createElement('figure');
      const img = document.createElement('img');
      img.src = 'images/' + p.file;
      img.alt = p.caption || 'صورة متابع';
      img.loading = 'lazy';
      fig.appendChild(img);
      if(p.caption){
        const cap = document.createElement('figcaption');
        cap.textContent = p.caption;
        fig.appendChild(cap);
      }
      fig.addEventListener('click', ()=>{
        lightboxImg.src = img.src;
        lightbox.classList.add('show');
      });
      grid.appendChild(fig);
    });
  }

  lightboxClose.addEventListener('click', ()=> lightbox.classList.remove('show'));
  lightbox.addEventListener('click', e=>{
    if(e.target === lightbox) lightbox.classList.remove('show');
  });
</script>

</body>
</html>
