<style>
  :root{
    --bg:#171310;
    --bg-elev:#211c17;
    --bg-elev-2:#2a231c;
    --gold:#c9a15f;
    --gold-soft:#e4c98a;
    --cream:#f1e9d8;

  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);

    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 20px 40px;
    position:relative;

  .display{font-family:'Amiri', serif;}

  /* ---------- tilted photo-collage background ---------- */
  .bg-collage{
    position:fixed;
    top:50%; left:50%;
    width:250vw; height:250vh;
    transform:translate(-50%,-50%) rotate(-20deg);
    display:grid;
    grid-template-columns:repeat(auto-fill, 220px);
    grid-auto-rows:220px;
    gap:4px;
    filter:blur(12px) brightness(.4) saturate(1.05);
    z-index:-3;
    pointer-events:none;
    animation:collageDrift 40s ease-in-out infinite;
  }
  @keyframes collageDrift{
    0%{ transform:translate(-50%,-50%) rotate(-20deg) translate(0,0); }
    50%{ transform:translate(-50%,-50%) rotate(-20deg) translate(-4%, 3%); }
    100%{ transform:translate(-50%,-50%) rotate(-20deg) translate(0,0); }
  }
  .bg-collage.noimg{ display:none; }
  .bg-collage .tile{ background-size:cover; background-position:center; }
  @media (prefers-reduced-motion: reduce){
    .bg-collage{ animation:none; }
  }
  .bg-overlay{
    position:fixed; inset:0; z-index:-2;
    background:rgba(23,19,16,.6);
    pointer-events:none;
  }

  .avatar{
    width:104px; height:104px; border-radius:50%;
    background:var(--bg-elev) center/cover no-repeat;
    border:2px solid var(--gold);
    box-shadow:0 0 0 8px rgba(201,161,95,.08);
    margin-bottom:20px;
  }
  .avatar.noimg{ background:var(--bg-elev); }

  h1{
    font-family:'Amiri', serif;
    font-size:clamp(1.6rem, 6vw, 2.1rem);
    color:var(--gold-soft);
    text-align:center;
  }
  .type-cursor{
    display:inline-block;
    color:var(--gold);
    animation:blink 1s step-end infinite;
    font-weight:300;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  @media (prefers-reduced-motion: reduce){
    .type-cursor{ animation:none; }
  }
  .subtitle{
    color:var(--muted);
    font-size:.9rem;
    margin-top:8px;
    margin-bottom:34px;
    text-align:center;
  }

  .links{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:13px;
  }
  .link-btn{
    display:flex;
    align-items:center;
    gap:14px;
    padding:15px 20px;
    border-radius:14px;
    background:var(--bg-elev);
    border:1px solid rgba(201,161,95,.22);
    text-decoration:none;
    color:var(--cream);
    font-weight:500;
    font-size:.98rem;
    transition:transform .3s ease, border-color .3s ease, background .3s ease;
  }
  .link-btn:hover{
    transform:translateY(-3px);
    border-color:var(--gold);
    background:var(--bg-elev-2);
  }
  .link-btn svg{ width:22px; height:22px; stroke:var(--gold-soft); flex-shrink:0; }
  .link-btn img.ic-img{ width:22px; height:22px; border-radius:6px; object-fit:cover; flex-shrink:0; }

  .back-wrap{
    width:100%;
    max-width:420px;
    margin-top:30px;
  }
  .back-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:14px 20px;
    border-radius:999px;
    text-decoration:none;
    font-weight:700;
    font-size:.92rem;
    color:var(--gold-soft);
    background:transparent;
    border:1px solid var(--gold);
    transition:transform .3s ease, background .3s ease;
  }
  .back-btn:hover{
    transform:translateY(-3px);
    background:rgba(201,161,95,.08);
  }
  .back-btn svg{ width:16px; height:16px; }
</style>

<script>
  function checkImg(url){
    return new Promise(res=>{
      const img = new Image();
      img.onload = ()=>res(true);
      img.onerror = ()=>res(false);
      img.src = url;
    });
  }
  checkImg('images/img3.png').then(ok=>{
    const av = document.getElementById('avatar');
    if(ok){ av.style.backgroundImage = "url('images/img3.png')"; }
    else{ av.classList.add('noimg'); }
  });

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  (async function buildCollage(){
    const candidates = Array.from({length:20}, (_,i)=>`images/img${i+1}.png`);
    const checks = await Promise.all(candidates.map(src=>checkImg(src).then(ok=>ok?src:null)));
    const available = checks.filter(Boolean);
    const collage = document.getElementById('bgCollage');
    if(available.length === 0){ collage.classList.add('noimg'); return; }

    const tileSize = 220;
    const containerW = window.innerWidth * 2.6;
    const containerH = window.innerHeight * 2.6;
    const cols = Math.ceil(containerW / tileSize);
    const rows = Math.ceil(containerH / tileSize);
    const total = cols * rows;

    const order = shuffle(available);
    for(let i=0;i<total;i++){
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.backgroundImage = `url('${order[i % order.length]}')`;
      collage.appendChild(tile);
    }
  })();

  /* ---------- typewriter cycling name ---------- */
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function typeText(el, text, speed){
    return new Promise(resolve=>{
      if(reduceMotion){ el.textContent = text; resolve(); return; }
      let i = 0;
      (function tick(){
        el.textContent = text.slice(0, i);
        i++;
        if(i <= text.length){ setTimeout(tick, speed); }
        else resolve();
      })();
    });
  }
  function eraseText(el, speed){
    return new Promise(resolve=>{
      if(reduceMotion){ el.textContent=''; resolve(); return; }
      let text = el.textContent;
      (function tick(){
        text = text.slice(0, -1);
        el.textContent = text;
        if(text.length > 0){ setTimeout(tick, speed); }
        else resolve();
      })();
    });
  }
  function wait(ms){ return new Promise(r=>setTimeout(r, ms)); }

  (async function(){
    const el = document.getElementById('nameTypeText');
    const names = ['بدر المطيري', 'سكوز', 'ابو كايف', 'ابو سكوز'];
    let i = 0;
    while(true){
      await typeText(el, names[i % names.length], 95);
      i++;
      await wait(2400);
      await eraseText(el, 28);
      await wait(350);
    }
  })();
</script>
